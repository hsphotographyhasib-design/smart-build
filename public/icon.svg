<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8962E"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>

  <!-- Background Rounded Square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Building Shape -->
  <rect x="156" y="200" width="200" height="220" rx="12" fill="rgba(255,255,255,0.95)"/>

  <!-- Windows -->
  <rect x="176" y="220" width="40" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>
  <rect x="234" y="220" width="40" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>
  <rect x="292" y="220" width="40" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>
  <rect x="176" y="290" width="40" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>
  <rect x="234" y="290" width="40" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>
  <rect x="292" y="290" width="40" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>
  <rect x="176" y="360" width="110" height="50" rx="6" fill="#1B5E20" opacity="0.85"/>

  <!-- Door -->
  <rect x="306" y="360" width="30" height="50" rx="4" fill="#C8962E"/>

  <!-- Roof -->
  <polygon points="126,208 256,100 386,208" fill="url(#roof)"/>

  <!-- HJSB Text -->
  <text x="256" y="458" font-family="Arial, sans-serif" font-weight="800" font-size="64" fill="white" text-anchor="middle" letter-spacing="4">HJSB</text>
</svg>
