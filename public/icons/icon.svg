<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" />
  <!-- Hard hat shape -->
  <path d="M140 300 Q140 180 256 160 Q372 180 372 300" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" />
  <!-- Hat brim -->
  <rect x="110" y="290" width="292" height="28" rx="14" fill="white" />
  <!-- Letter S integrated -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="bold" fill="white">S</text>
  <!-- Building accent lines -->
  <line x1="190" y1="230" x2="190" y2="280" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round" />
  <line x1="256" y1="210" x2="256" y2="280" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round" />
  <line x1="322" y1="230" x2="322" y2="280" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round" />
</svg>