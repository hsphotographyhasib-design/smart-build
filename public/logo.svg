<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8962E"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>

  <!-- Building Icon -->
  <rect x="8" y="28" width="40" height="52" rx="4" fill="url(#logo-grad)"/>
  <rect x="14" y="34" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="26" y="34" width="8" height="12" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="34" y="34" width="8" height="8" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="14" y="50" width="8" height="8" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="26" y="50" width="8" height="8" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="14" y="62" width="20" height="12" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <!-- Roof -->
  <polygon points="6,32 28,14 50,32" fill="url(#gold-grad)"/>

  <!-- HJSB Text -->
  <text x="76" y="62" font-family="'Segoe UI', 'Poppins', Arial, sans-serif" font-weight="700" font-size="48" fill="#1A1A2E" letter-spacing="3">HJSB</text>
  <!-- Tagline -->
  <text x="76" y="85" font-family="'Segoe UI', 'Poppins', Arial, sans-serif" font-weight="500" font-size="14" fill="#C8962E" letter-spacing="6">EPPM</text>
</svg>
