# =============================================================================
# SmartBuild — Nginx Main Configuration
# Target: VPS / Docker host running Ubuntu 22.04+
# Nginx version: 1.25+ (with http_v2_module, http_gzip_static_module)
#
# Brotli note:
#   Brotli is NOT built into mainline Nginx. You must use either:
#   (a) nginx with libbrotli compiled in (e.g. FROM fholzer/nginx-brotli in Docker)
#   (b) The nginx/nginx-quic image which includes brotli
#   (c) Add the ngx_brotli dynamic module: https://github.com/google/ngx_brotli
#   The brotli directives in smartbuild.conf are commented out until the module
#   is confirmed available in your image.
# =============================================================================

user nginx;

# Tune to number of CPU cores. "auto" detects at runtime.
worker_processes auto;

# Maximum open files per worker. Must be <= system ulimit -n.
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker.
    # Total capacity = worker_processes * worker_connections
    worker_connections 4096;

    # Accept as many connections as possible on Linux.
    use epoll;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # MIME types
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Security — hide Nginx version in headers and error pages
    # -------------------------------------------------------------------------
    server_tokens off;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;

    # Keep connections alive for 65 s (aligns with common load-balancer timeouts)
    keepalive_timeout  65;
    keepalive_requests 1000;

    # -------------------------------------------------------------------------
    # Client body / buffer sizes
    # -------------------------------------------------------------------------
    # Allow large file uploads (invoices, project docs, WhatsApp media)
    client_max_body_size        100m;
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;
    client_body_timeout         60s;
    client_header_timeout       15s;
    send_timeout                60s;

    # -------------------------------------------------------------------------
    # Proxy global defaults (overridden per-location as needed)
    # -------------------------------------------------------------------------
    proxy_http_version          1.1;
    proxy_buffering             on;
    proxy_buffer_size           16k;
    proxy_buffers               8 32k;
    proxy_busy_buffers_size     64k;
    proxy_temp_file_write_size  64k;
    proxy_read_timeout          90s;
    proxy_connect_timeout       10s;
    proxy_send_timeout          90s;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # -------------------------------------------------------------------------
    # Gzip compression (native, always available)
    # -------------------------------------------------------------------------
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_http_version  1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        application/x-font-truetype
        image/svg+xml
        image/x-icon
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # -------------------------------------------------------------------------
    # Rate limiting zones (defined globally, applied per-location)
    # -------------------------------------------------------------------------
    # login: max 5 req/min burst 10 — brute-force protection
    limit_req_zone $binary_remote_addr zone=login:10m   rate=5r/m;
    # otp: max 3 req/min burst 5 — strict OTP attempt throttling
    limit_req_zone $binary_remote_addr zone=otp:10m     rate=3r/m;
    # api: max 100 req/min burst 200 — general API traffic
    limit_req_zone $binary_remote_addr zone=api:20m     rate=100r/m;
    # uploads: max 20 req/min burst 30 — file upload endpoints
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=20r/m;

    # Return 429 Too Many Requests (not 503) when rate limit exceeded
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Real-IP from trusted proxies/CDN — adjust CIDR to your setup
    # -------------------------------------------------------------------------
    # set_real_ip_from 103.21.244.0/22;   # Cloudflare example
    # set_real_ip_from 172.16.0.0/12;     # Docker internal network
    # real_ip_header   CF-Connecting-IP;

    # -------------------------------------------------------------------------
    # Include virtual-host configs
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
