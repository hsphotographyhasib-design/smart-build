# =============================================================================
# SmartBuild — Virtual-Host / Site Configuration
# Domain: ${DOMAIN}  (replace at deploy time, e.g. app.smartbuild.io)
#
# TLS notes:
#   1. Install certbot: apt install certbot python3-certbot-nginx
#   2. Obtain cert: certbot --nginx -d ${DOMAIN} -d www.${DOMAIN}
#      Certbot will auto-edit this file or write a new include block.
#   3. Auto-renewal: certbot renew is added to /etc/cron.d/certbot by default.
#      Verify: certbot renew --dry-run
#   4. For wildcard certs (*.smartbuild.io) use DNS-01 challenge:
#      certbot certonly --dns-cloudflare --dns-cloudflare-credentials ...
# =============================================================================

# -------------------------------------------------------------------------
# Upstream: Next.js app
# Multiple instances are listed (commented) for horizontal scaling.
# least_conn distributes to the instance with fewest active connections.
# For sticky sessions (e.g. long-lived SSE or auth cookies) uncomment
# ip_hash below — note: ip_hash overrides least_conn.
# -------------------------------------------------------------------------
upstream nextjs_app {
    least_conn;
    # ip_hash;   # Uncomment for sticky-session load balancing

    server 127.0.0.1:3000;          # Primary (or only) instance
    # server 127.0.0.1:3001;        # Scale-out instance 2 (same host)
    # server 127.0.0.1:3002;        # Scale-out instance 3

    # Keepalive connections to upstream (improves throughput under load)
    keepalive 32;
}

# -------------------------------------------------------------------------
# Upstream: Socket.IO realtime service (port 3006)
# Only a single instance — Socket.IO clustering requires Redis adapter
# (redis is included in infra/docker-compose.yml).
# If you run multiple Socket.IO nodes, add them here AND configure the
# Redis adapter in mini-services/whatsapp-realtime/index.ts.
# -------------------------------------------------------------------------
upstream socketio_server {
    # ip_hash is critical for Socket.IO — the polling fallback needs sticky
    # routing so every polling request lands on the same node as the socket.
    ip_hash;

    server 127.0.0.1:3006;
    # server 127.0.0.1:3007;   # Scale-out — needs Redis adapter enabled

    keepalive 16;
}

# -------------------------------------------------------------------------
# HTTP → HTTPS redirect (port 80)
# -------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name ${DOMAIN} www.${DOMAIN};

    # ACME challenge location for certbot (must remain on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS with 301 permanent
    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------------------------
# HTTPS main server (port 443)
# -------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    # HTTP/2 — enabled via http2 directive (Nginx 1.25.1+ one-liner)
    # For older Nginx use: listen 443 ssl http2;
    http2 on;

    server_name ${DOMAIN} www.${DOMAIN};

    # ------------------------------------------------------------------
    # TLS certificates (managed by certbot; paths below are Let's Encrypt
    # defaults — adjust if you use a commercial CA)
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Modern TLS — TLS 1.2 minimum, TLS 1.3 preferred
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;   # Let client choose from the allowed list
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;   # Forward secrecy — disable ticket reuse

    # OCSP stapling — speeds up TLS handshake by pre-fetching revocation info
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Diffie-Hellman params (generate once: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------

    # Strict Transport Security — tell browsers to always use HTTPS for 1 year
    # includeSubDomains + preload: only add after you are confident all
    # subdomains support HTTPS (you can submit to hstspreload.org)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy — send origin only on cross-origin requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy — PLACEHOLDER. Adjust to your actual origins.
    # Test mode: use Content-Security-Policy-Report-Only first.
    # Key directives for SmartBuild (Next.js, Socket.IO, WhatsApp media):
    #   - script-src: Next.js chunks are all same-origin; add nonce if using inline scripts
    #   - connect-src: must include wss://${DOMAIN} for Socket.IO WebSocket
    #   - img-src: include blob: for canvas exports and data: for base64 previews
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss://${DOMAIN} ws://${DOMAIN} https:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self'; base-uri 'self';" always;

    # Permissions Policy — disable features not used by SmartBuild
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;

    # X-XSS-Protection — legacy browsers (modern browsers use CSP instead)
    add_header X-XSS-Protection "1; mode=block" always;

    # ------------------------------------------------------------------
    # Brotli compression (requires ngx_brotli module)
    # Uncomment after confirming module is loaded in nginx.conf:
    #   load_module modules/ngx_http_brotli_filter_module.so;
    #   load_module modules/ngx_http_brotli_static_module.so;
    # ------------------------------------------------------------------
    # brotli on;
    # brotli_comp_level 6;
    # brotli_min_length 1000;
    # brotli_types
    #     text/plain text/css text/javascript application/json
    #     application/javascript application/x-javascript application/xml
    #     font/woff font/woff2 image/svg+xml;

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    access_log /var/log/nginx/smartbuild.access.log main;
    error_log  /var/log/nginx/smartbuild.error.log warn;

    # ------------------------------------------------------------------
    # Root for static ACME challenge files
    # ------------------------------------------------------------------
    root /var/www/smartbuild;

    # ==================================================================
    # Location blocks — order matters (exact > prefix > regex)
    # ==================================================================

    # ------------------------------------------------------------------
    # /socket.io — WebSocket proxy to Socket.IO server (port 3006)
    # ------------------------------------------------------------------
    # HOW WEBSOCKET PROXYING WORKS:
    # 1. Browser sends HTTP GET /socket.io/?EIO=4&transport=websocket
    #    with headers: Connection: Upgrade, Upgrade: websocket
    # 2. Nginx passes the Upgrade/Connection headers to the upstream.
    # 3. Upstream responds 101 Switching Protocols.
    # 4. Nginx acts as a transparent TCP tunnel for the WS frames.
    # 5. Socket.IO also uses long-polling fallback (transport=polling).
    #    The long read timeout (proxy_read_timeout 3600s) is essential —
    #    a polling request parks on the server until data arrives or
    #    timeout fires; too-short a timeout causes unnecessary reconnects.
    # ------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://socketio_server;

        # WebSocket upgrade headers — REQUIRED
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard forwarding
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent connections / long-polling
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time data (SSE / streaming)
        proxy_buffering    off;
        proxy_cache        off;

        # No rate limit on socket handshake (client reconnect storms)
        # If abuse is seen, add: limit_req zone=api burst=20 nodelay;

        # Socket.IO uses its own keep-alive; don't cache at nginx level
        add_header Cache-Control "no-store" always;
    }

    # ------------------------------------------------------------------
    # Authentication endpoints — strict rate limiting
    # ------------------------------------------------------------------
    location = /api/auth/login {
        limit_req zone=login burst=10 nodelay;
        limit_req_log_level warn;
        proxy_pass http://nextjs_app;
    }

    location ~ ^/api/auth/(register|forgot-password|reset-password) {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://nextjs_app;
    }

    location ~ ^/api/auth/(verify-otp|send-otp|2fa) {
        limit_req zone=otp burst=5 nodelay;
        proxy_pass http://nextjs_app;
    }

    # ------------------------------------------------------------------
    # Upload endpoints — rate limited, large body allowed
    # ------------------------------------------------------------------
    location ~ ^/api/(upload|media|files) {
        limit_req zone=uploads burst=30 nodelay;

        # Allow large file uploads (overrides global 100m if needed)
        client_max_body_size 200m;

        proxy_pass             http://nextjs_app;
        proxy_read_timeout     300s;   # Long timeout for large uploads
        proxy_request_buffering off;   # Stream upload directly to upstream
    }

    # ------------------------------------------------------------------
    # General API routes — standard rate limiting
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=200 nodelay;

        proxy_pass http://nextjs_app;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ------------------------------------------------------------------
    # Next.js static assets — aggressive cache (content-hashed filenames)
    # ------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://nextjs_app;

        # Immutable: Next.js content-hashes filenames; safe to cache forever
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header ETag $upstream_http_etag;

        # Serve pre-compressed files if available (.gz / .br)
        gzip_static on;
        # brotli_static on;   # Uncomment when brotli module is loaded
    }

    # ------------------------------------------------------------------
    # Next.js image optimization endpoint
    # ------------------------------------------------------------------
    location /_next/image {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400" always;
    }

    # ------------------------------------------------------------------
    # Static media served from object storage or local filesystem
    #
    # PLACEHOLDER — choose one of the strategies below:
    #
    # Strategy A (local filesystem / Docker volume):
    #   Point alias to the mounted volume path on the host, e.g.
    #   /var/smartbuild/uploads  (set UPLOAD_PATH env var in docker-compose)
    #
    # Strategy B (S3/MinIO/R2 presigned URL proxy):
    #   Replace proxy_pass with the bucket origin and add auth headers.
    #   Consider using Nginx's proxy_cache for S3 origin shielding.
    #
    # Strategy C (CDN):
    #   Return 302 redirect to CDN URL rather than serving via Nginx.
    # ------------------------------------------------------------------
    location /uploads/ {
        limit_req zone=uploads burst=50 nodelay;

        # Strategy A — local volume (uncomment and adjust path)
        # alias /var/smartbuild/uploads/;
        # autoindex off;
        # expires 7d;
        # add_header Cache-Control "public, max-age=604800" always;
        # add_header ETag $upstream_http_etag;

        # Fallback to Next app until object storage is configured
        proxy_pass http://nextjs_app;
    }

    location /media/ {
        # Same strategy options as /uploads/ above
        # alias /var/smartbuild/media/;
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /files/ {
        limit_req zone=uploads burst=30 nodelay;
        # alias /var/smartbuild/files/;
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # ------------------------------------------------------------------
    # Public static files (robots.txt, manifest.json, icons, etc.)
    # ------------------------------------------------------------------
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|mp4|webm)$ {
        proxy_pass http://nextjs_app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header ETag $upstream_http_etag;
        add_header Vary "Accept-Encoding";
    }

    # ------------------------------------------------------------------
    # Favicon
    # ------------------------------------------------------------------
    location = /favicon.ico {
        proxy_pass http://nextjs_app;
        expires 7d;
        log_not_found off;
        access_log    off;
    }

    location = /robots.txt {
        proxy_pass http://nextjs_app;
        log_not_found off;
        access_log    off;
    }

    # ------------------------------------------------------------------
    # Next.js app — catch-all (pages, RSC, API routes not matched above)
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://nextjs_app;

        # ETag pass-through for conditional GET (304 Not Modified)
        add_header ETag $upstream_http_etag;

        # Proxy buffering on for HTML pages (reduces TTFB variance)
        proxy_buffering on;
    }

    # ------------------------------------------------------------------
    # Health check endpoint (used by load balancers / uptime monitors)
    # Returns 200 without hitting the upstream
    # ------------------------------------------------------------------
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # Deny dot-file access (e.g. .env, .git, .htaccess)
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
