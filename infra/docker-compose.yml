# =============================================================================
# SmartBuild — Production Docker Compose
#
# Services:
#   app       — Next.js standalone app (port 3000, internal only)
#   realtime  — Socket.IO + HTTP bridge (ports 3006/3096, internal only)
#   nginx     — Reverse proxy (ports 80/443, public)
#   redis     — Cache + Socket.IO multi-node adapter (internal only)
#   mysql     — Relational database (internal only, persistent volume)
#
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml logs -f
#
# First-run DB migration (run once after containers start):
#   docker compose -f infra/docker-compose.yml exec app \
#     npx prisma migrate deploy
#
# IMPORTANT: See infra/README.md for full deploy instructions.
#
# NOTE: The schema.prisma currently uses SQLite for development.
# For production MySQL, update the datasource provider and DATABASE_URL,
# then run: npx prisma migrate dev --name init
# This compose file sets up MySQL so it is ready when you make that switch.
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared network — all containers communicate over this bridge network.
# External traffic enters only through the nginx service.
# ---------------------------------------------------------------------------
networks:
  smartbuild-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ---------------------------------------------------------------------------
# Named volumes — data survives container restarts/rebuilds
# ---------------------------------------------------------------------------
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  # Upload/media storage — mount a host path in production for backups
  uploads-data:
    driver: local
  # Let's Encrypt certificate storage
  letsencrypt:
    driver: local
  # Certbot webroot for ACME HTTP-01 challenge
  certbot-webroot:
    driver: local

# ---------------------------------------------------------------------------
# Common environment variable defaults (anchors for reuse)
# ---------------------------------------------------------------------------
x-app-env: &app-env
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  # Database — override DATABASE_URL in .env
  DATABASE_URL: ${DATABASE_URL:-mysql://smartbuild:${MYSQL_PASSWORD:-changeme}@mysql:3306/smartbuild}
  # Redis
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  # Application secrets — MUST be set in .env
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
  NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.smartbuild.io}
  # Realtime service bridge (internal Docker DNS)
  REALTIME_BRIDGE_URL: http://realtime:3096
  # File storage
  UPLOAD_PATH: /app/upload

services:
  # =========================================================================
  # MySQL — relational database
  # =========================================================================
  mysql:
    image: mysql:8.0
    container_name: smartbuild-mysql
    restart: unless-stopped
    networks:
      - smartbuild-net

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartbuild}
      MYSQL_USER: ${MYSQL_USER:-smartbuild}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}

    volumes:
      - mysql-data:/var/lib/mysql
      # Place custom MySQL config here (optional):
      # - ./infra/mysql/my.cnf:/etc/mysql/conf.d/smartbuild.cnf:ro

    # Expose on 127.0.0.1 only for direct DB access (DBeaver, migrations).
    # Comment out if you don't need external DB access.
    ports:
      - "127.0.0.1:3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # =========================================================================
  # Redis — session cache + Socket.IO adapter (multi-node future-proofing)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: smartbuild-redis
    restart: unless-stopped
    networks:
      - smartbuild-net

    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-changeme_redis}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --appendonly yes

    volumes:
      - redis-data:/data

    # Expose on loopback only for redis-cli debugging
    ports:
      - "127.0.0.1:6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}",
             "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Realtime mini-service — Socket.IO (3006) + HTTP bridge (3096)
  # =========================================================================
  realtime:
    build:
      context: ..   # repo root (Dockerfile references mini-services/ path)
      dockerfile: infra/docker/Dockerfile.realtime
    image: smartbuild-realtime:latest
    container_name: smartbuild-realtime
    restart: unless-stopped
    networks:
      - smartbuild-net

    environment:
      NODE_ENV: production
      # Socket.IO CORS origin — set to your actual domain
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.smartbuild.io}

    # Ports are NOT exposed externally — Nginx proxies /socket.io/ to port
    # 3006 inside the Docker network. Port 3096 (HTTP bridge) is called
    # only by the `app` container and stays fully internal.
    expose:
      - "3006"
      - "3096"

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-fsS",
             "-X", "POST",
             "http://localhost:3096/api/events",
             "-H", "Content-Type: application/json",
             "-d", "{\"room\":\"__health__\",\"event\":\"ping\"}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # =========================================================================
  # Next.js App — standalone server
  # =========================================================================
  app:
    build:
      context: ..   # repo root
      dockerfile: infra/docker/Dockerfile
    image: smartbuild-app:latest
    container_name: smartbuild-app
    restart: unless-stopped
    networks:
      - smartbuild-net

    environment:
      <<: *app-env

    volumes:
      # Persistent upload storage — survives container recreation
      - uploads-data:/app/upload

    # Port is NOT exposed externally — Nginx proxies to this port.
    # To debug directly: docker compose exec app curl localhost:3000/api/health
    expose:
      - "3000"

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      realtime:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health",
             "--fail-with-body"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # =========================================================================
  # Nginx — reverse proxy (public entry point)
  # =========================================================================
  nginx:
    # fholzer/nginx-brotli provides mainline Nginx + compiled brotli module.
    # Switch to plain "nginx:1.25-alpine" if brotli is not needed.
    image: fholzer/nginx-brotli:latest
    container_name: smartbuild-nginx
    restart: unless-stopped
    networks:
      - smartbuild-net

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates managed by certbot on the host
      - letsencrypt:/etc/letsencrypt:ro
      # ACME challenge webroot (shared with certbot)
      - certbot-webroot:/var/www/certbot:ro
      # Persistent log storage
      - nginx-logs:/var/log/nginx

    depends_on:
      app:
        condition: service_healthy
      realtime:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =========================================================================
  # Certbot — Let's Encrypt certificate renewal (optional sidecar)
  #
  # Uncomment this service to automate certificate renewal inside Docker.
  # Alternatively, run certbot on the host and mount certs into nginx above.
  # =========================================================================
  # certbot:
  #   image: certbot/certbot:latest
  #   container_name: smartbuild-certbot
  #   restart: unless-stopped
  #   volumes:
  #     - letsencrypt:/etc/letsencrypt
  #     - certbot-webroot:/var/www/certbot
  #   # Renew twice daily (certbot is idempotent — skips if not due)
  #   entrypoint: /bin/sh -c "trap exit TERM; while :; do
  #     certbot renew --webroot -w /var/www/certbot --quiet;
  #     sleep 43200 & wait $${!}; done"
  #   depends_on:
  #     - nginx
